<div class="search-container">
    <form action="{{ action }}" method="GET" class="search-form">
        {% if request.GET.attribute %}
            <input type="hidden" name="attribute" value="{{ request.GET.attribute }}">
        {% endif %}
        <input type="text" name="search" class="search-input" placeholder="Add Text Here" value="{{ request.GET.search|default:'' }}">
        <button type="submit" class="search-btn">Search</button>
    </form>
</div>
