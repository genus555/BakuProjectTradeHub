{% extends 'base.html' %}

{% block content %}
<div class="login-container">
    <h2>Login</h2>

    {% if error %}
        <div class="fubar">
            <p>{{ error }}</p>
        </div>
    {% endif %}

    <form action="{% url 'login' %}" method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="discord_name">Discord Name:</label>
            <input type="text" id="discord_name" name="discord_name" value="{{ values.discord_name|default:'' }}" required>
        </div>
        <div class="form-group">
            <label for="otp_code">6-Digit Code:</label>
            <input type="text" id="otp_code" name="otp_code" value="{{ values.otp_code|default:'' }}" required>
        </div>

        <button type="submit">Login</button>
    </form>
    <div class="signup-prompt">
        <p>First time here? <a href="{% url 'signup' %}" class="links">Signup Here</a></p>
    </div>
</div>
{% endblock %}
